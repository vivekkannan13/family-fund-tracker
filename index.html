<!DOCTYPE html>
<html>
<head>
<title>Family Fund Tracker</title>
<style>
body{
  font-family: Arial;
  text-align:center;
  background:#f5f5f5;
}

.container{
  display:grid;
  grid-template-columns: repeat(3,1fr);
  gap:15px;
  padding:30px;
}

button{
  padding:15px;
  font-size:16px;
  background:green;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

input, select{
  padding:10px;
  margin:5px;
  font-size:14px;
}

#details{
  margin-top:20px;
  font-size:18px;
}
</style>
</head>

<body>

<h1>Family Monthly Fund</h1>

<h3>Update Contribution</h3>

<select id="name">
  <option>Subbiah</option>
  <option>Rajesh</option>
  <option>Ashok</option>
  <option>Saravanan</option>
  <option>Veermani</option>
  <option>Venkat</option>
  <option>Shanmugam</option>
  <option>Murugan</option>
  <option>Panju</option>
  <option>Kandan</option>
</select>

<select id="month">
  <option>Apr</option>
  <option>May</option>
  <option>Jun</option>
  <option>Jul</option>
  <option>Aug</option>
  <option>Sep</option>
  <option>Oct</option>
  <option>Nov</option>
  <option>Dec</option>
</select>

<input type="number" id="amount" placeholder="Enter amount">

<button onclick="updateAmount()">Update</button>

<hr>

<div class="container">
  <button onclick="showData('Subbiah')">Subbiah</button>
  <button onclick="showData('Rajesh')">Rajesh</button>
  <button onclick="showData('Ashok')">Ashok</button>
  <button onclick="showData('Saravanan')">Saravanan</button>
  <button onclick="showData('Veermani')">Veermani</button>
  <button onclick="showData('Venkat')">Venkat</button>
  <button onclick="showData('Shanmugam')">Shanmugam</button>
  <button onclick="showData('Murugan')">Murugan</button>
  <button onclick="showData('Panju')">Panju</button>
  <button onclick="showData('Kandan')">Kandan</button>
</div>

<div id="details"></div>

<!-- Firebase Scripts -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyD3MPBiGCgCiZC4NyODBf_PADPg6A_rw0A",
  authDomain: "familyfund-5938b.firebaseapp.com",
  projectId: "familyfund-5938b",
  storageBucket: "familyfund-5938b.appspot.com",
  messagingSenderId: "155160493739",
  appId: "1:155160493739:web:d3504ed4275c8b7bb281ee"
};

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ✅ Update Function
function updateAmount() {
  let name = document.getElementById("name").value.trim();
  let month = document.getElementById("month").value.trim();
  let amount = document.getElementById("amount").value.trim();

  if (!name || !month || !amount) {
    alert("Please fill all fields!");
    return;
  }

  amount = Number(amount); // convert string to number

  console.log("Updating:", name, month, amount);

  db.collection("funds").doc(name).set(
    { [month]: amount },
    { merge: true }
  )
  .then(() => {
    console.log("Firestore updated successfully");
    alert(name + " - " + month + " saved!");
    document.getElementById("amount").value = ""; // clear input
  })
  .catch((error) => {
    console.error("Firestore update failed:", error);
    alert("Error saving data");
  });
}

// ✅ Show Function
function showData(name) {
  db.collection("funds").doc(name).get()
    .then((doc) => {
      let person = doc.data() || {};
      let total = 0;
      let months = ["Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

      months.forEach(m => {
        if (!person[m]) person[m] = 0;
        total += person[m];
      });

      let html = "<h2>" + name + "</h2>";
      months.forEach(m => {
        html += m + " : ₹" + person[m] + "<br>";
      });
      html += "<br><b>Total : ₹" + total + "</b>";

      document.getElementById("details").innerHTML = html;
    })
    .catch((error) => {
      console.error("Error fetching data:", error);
      alert("Error fetching data");
    });
}
</script>

</body>
</html>
