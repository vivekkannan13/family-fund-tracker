<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Family Fund Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<style>
  body{
    font-family: 'Roboto', sans-serif;
    background: linear-gradient(to right, #fbc2eb, #a6c1ee);
    margin:0;
    padding:0;
    color:#333;
  }

  header{
    text-align:center;
    padding: 30px 10px;
    background:#34495e;
    color:white;
  }

  main{
    max-width:900px;
    margin:20px auto;
    background:white;
    border-radius:15px;
    padding:25px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
  }

  h1, h2, h3{
    margin:5px 0;
  }

  label{
    display:block;
    margin-top:15px;
    font-weight:bold;
  }

  /* Gradient for select/input fields */
  select, input[type="number"] {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 16px;
    box-sizing: border-box;
    background: linear-gradient(135deg, #ffecd2, #fcb69f);
    color: #2c3e50;
    font-weight: bold;
    outline: none;
    transition: 0.3s;
  }

  select:focus, input[type="number"]:focus {
    border: 2px solid #e67e22;
    box-shadow: 0 0 5px rgba(230,126,34,0.5);
    background: linear-gradient(135deg, #f6d365, #fda085);
  }

  button{
    padding:12px 25px;
    margin-top:15px;
    font-size:16px;
    background:#3498db;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
  }

  button:hover{
    background:#2980b9;
  }

  .container{
    display:grid;
    grid-template-columns: repeat(5, 1fr);
    gap:10px;
    margin-top:20px;
  }

  .container button{
    padding:10px;
    font-size:14px;
    background:#2ecc71;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
  }

  .container button:hover{
    background:#27ae60;
  }

  #details {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 15px;
    margin-top: 25px;
  }

  .card {
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    border-radius: 12px;
    padding: 15px;
    text-align: center;
    box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    transition: 0.3s;
  }

  .card:hover { 
    transform: translateY(-3px); 
    box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
  }

  .card h4 { 
    margin: 10px 0 5px; 
    color: #2c3e50; 
  }

  .card p { 
    margin: 0; 
    font-weight: bold; 
    color: #34495e; 
  }

  .total-card {
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    color: #2c3e50;
    font-size: 18px;
  }

</style>
</head>
<body>

<header>
  <h1>Family Fund Tracker</h1>
  <h3>Update Contributions</h3>
</header>

<main>
  <label for="name">Name</label>
  <select id="name">
    <option>Subbiah</option>
    <option>Rajesh</option>
    <option>Ashok</option>
    <option>Saravanan</option>
    <option>Veermani</option>
    <option>Venkat</option>
    <option>Shanmugam</option>
    <option>Murugan</option>
    <option>Panju</option>
    <option>Kandan</option>
  </select>

  <label for="month">Month</label>
  <select id="month">
    <option>Apr</option><option>May</option><option>Jun</option><option>Jul</option>
    <option>Aug</option><option>Sep</option><option>Oct</option><option>Nov</option><option>Dec</option>
  </select>

  <input type="number" id="amount" placeholder="Enter amount">
  <button onclick="updateAmount()">Update Contribution</button>

  <div class="container">
    <button onclick="showData('Subbiah')">Subbiah</button>
    <button onclick="showData('Rajesh')">Rajesh</button>
    <button onclick="showData('Ashok')">Ashok</button>
    <button onclick="showData('Saravanan')">Saravanan</button>
    <button onclick="showData('Veermani')">Veermani</button>
    <button onclick="showData('Venkat')">Venkat</button>
    <button onclick="showData('Shanmugam')">Shanmugam</button>
    <button onclick="showData('Murugan')">Murugan</button>
    <button onclick="showData('Panju')">Panju</button>
    <button onclick="showData('Kandan')">Kandan</button>
  </div>

  <div id="details"></div>
</main>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyD3MPBiGCgCiZC4NyODBf_PADPg6A_rw0A",
  authDomain: "familyfund-5938b.firebaseapp.com",
  projectId: "familyfund-5938b",
  storageBucket: "familyfund-5938b.firebasestorage.app",
  messagingSenderId: "155160493739",
  appId: "1:155160493739:web:d3504ed4275c8b7bb281ee"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// Update contribution (everyone can update)
function updateAmount(){
  let name = document.getElementById("name").value;
  let month = document.getElementById("month").value;
  let amount = document.getElementById("amount").value;

  if(amount === ""){
    alert("Enter amount");
    return;
  }

  db.collection("funds").doc(name).set({
    [month]: Number(amount)
  }, { merge: true })
  .then(() => {
    alert(name + " - " + month + " saved!");
  })
  .catch((error) => {
    console.error("Error:", error);
    alert("Error saving data.");
  });
}

// Show data
function showData(name){
  db.collection("funds").doc(name).get().then((doc) => {
    let person = doc.data() || {};
    let total = 0;
    let months = ["Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    months.forEach(m => {
       if(!person[m]) person[m] = 0;
       total += person[m];
    });

    let html = "";
    months.forEach(m => {
      html += `<div class="card"><h4>${m}</h4><p>₹${person[m]}</p></div>`;
    });
    html += `<div class="card total-card"><h4>Total</h4><p>₹${total}</p></div>`;

    document.getElementById("details").innerHTML = html;
  });
}
</script>

</body>
</html>
